services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 4G

  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "ollama pull qwen3:4b && ollama pull qwen3:1.7b"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    profiles:
      - scan

  aegis:
    build:
      context: .
      target: runtime
    command: ["scan"]
    volumes:
      - ./reports:/app/reports
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - AEGIS_REPORTS_DIR=/app/reports
      # Optional: set to "local" (default) or "api"
      # - AEGIS_PROVIDER_MODE=local
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    profiles:
      - scan

  dashboard:
    build:
      context: .
      target: dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./reports:/app/reports:ro
    environment:
      - AEGIS_REPORTS_DIR=/app/reports
    profiles:
      - dashboard

volumes:
  ollama_data:
