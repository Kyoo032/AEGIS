# Day 7 gate config: core-7 baseline scope only.
#
# Use with:
#   .venv/bin/python -m aegis.orchestrator scan -c aegis/config.day7_core7.yaml -o <output>.json
#
# This config intentionally excludes llm02_data_disclosure so Day 7 gate evidence
# matches the required core 7 module set.

testbed:
  provider:
    mode: "auto"
  agent_profile: "default"

attacks:
  modules:
    - asi01_goal_hijack
    - asi02_tool_misuse
    - asi04_supply_chain
    - asi05_code_exec
    - asi06_memory_poison
    - mcp06_cmd_injection
    - llm01_prompt_inject

evaluation:
  scorers:
    - rule_based
    - llm_judge

defenses:
  active: []

reporting:
  formats: ["json", "html"]
  output_dir: "./reports"
