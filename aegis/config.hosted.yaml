# AEGIS hosted provider template.
# Copy or edit this file for any hosted model provider:
#   uv run aegis scan --config aegis/config.hosted.yaml
#
# Choose provider.mode based on the API shape:
#   openai_compat  - chat/completions-compatible APIs
#   anthropic      - Messages API shape
#   hf_inference   - hosted inference endpoint shape
#
# Keep API keys in environment variables, not in this YAML file.

testbed:
  model: replace-with-provider-model
  provider:
    mode: openai_compat
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    model: replace-with-provider-model
    timeout_seconds: 60
    max_tokens: 512
    require_external: true
  agent_profile: default

attacks:
  modules:
    - llm01_prompt_inject
    - asi02_tool_misuse
    - mcp06_cmd_injection
  payloads_per_module: 5
  multi_turn: true

evaluation:
  scorers:
    - rule_based

defenses: {}

reporting:
  output_dir: ./reports/hosted
  formats:
    - json
  include_atlas_mapping: true
