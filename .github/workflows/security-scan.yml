name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1"  # Monday 3am UTC
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type"
        required: false
        default: "baseline"
        type: choice
        options:
          - baseline
          - matrix
      config:
        description: "Optional config file path"
        required: false
        type: string
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run AEGIS security scan (offline mode)
        id: scan
        env:
          AEGIS_PROVIDER_MODE: "offline"
        run: |
          SCAN_TYPE="${{ inputs.scan_type || 'baseline' }}"
          OUTPUT_DIR="reports/ci_scan_results"
          mkdir -p "${OUTPUT_DIR}"

          CONFIG_ARGS=()
          if [ -n "${{ inputs.config }}" ]; then
            CONFIG_ARGS+=(--config "${{ inputs.config }}")
          fi

          # Exit code 2 = vulnerabilities found (expected)
          set +e
          if [ "${SCAN_TYPE}" = "matrix" ]; then
            .venv/bin/aegis matrix \
              --format json \
              "${CONFIG_ARGS[@]}" \
              --output "${OUTPUT_DIR}"
          else
            .venv/bin/aegis scan \
              --format json \
              "${CONFIG_ARGS[@]}" \
              --output "${OUTPUT_DIR}"
          fi
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${status}" -ne 2 ]; then
            exit "${status}"
          fi

          if [ "${SCAN_TYPE}" = "matrix" ]; then
            SUMMARY_PATH="$(find "${OUTPUT_DIR}" -maxdepth 1 -name 'day89_defense_matrix_*.json' | sort | tail -n 1)"
            if [ -z "${SUMMARY_PATH}" ]; then
              echo "::error::Matrix run did not produce a defense matrix summary"
              exit 1
            fi
            cp "${SUMMARY_PATH}" reports/ci_scan_results.json
          else
            cp "${OUTPUT_DIR}/baseline.json" reports/ci_scan_results.json
          fi

          echo "scan_type=${SCAN_TYPE}" >> "$GITHUB_OUTPUT"

      - name: Generate HTML report
        if: always() && hashFiles('reports/ci_scan_results.json') != ''
        run: |
          .venv/bin/aegis report \
            --input reports/ci_scan_results.json \
            --format html \
            --output reports/ci_scan_results.html || true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-scan-results
          path: |
            reports/ci_scan_results.json
            reports/ci_scan_results.html
            reports/ci_scan_results/
          retention-days: 90

      - name: Check for critical findings
        id: check_critical
        if: always() && hashFiles('reports/ci_scan_results.json') != ''
        run: |
          REPORT_PATH="reports/ci_scan_results.json"
          if [ "${{ steps.scan.outputs.scan_type }}" = "matrix" ] && [ -f reports/ci_scan_results/baseline.json ]; then
            REPORT_PATH="reports/ci_scan_results/baseline.json"
          fi

          CRITICAL=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('${REPORT_PATH}'))
              findings = data.get('findings', [])
              critical = [f for f in findings if f.get('severity') == 'critical']
              print(len(critical))
          except Exception:
              print(0)
          ")
          echo "critical_count=${CRITICAL}" >> "$GITHUB_OUTPUT"
          if [ "${CRITICAL}" -gt 0 ]; then
            echo "::warning::Found ${CRITICAL} critical finding(s)"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && hashFiles('reports/ci_scan_results.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### AEGIS Security Scan Results\n\n';
            try {
              const data = JSON.parse(fs.readFileSync('reports/ci_scan_results.json', 'utf8'));
              const scanType = '${{ steps.scan.outputs.scan_type }}';
              summary += `Scan type: \`${scanType}\`\n\n`;

              if (data.scenarios) {
                const baseline = Number(data.baseline || 0);
                const scenarios = Object.keys(data.scenarios || {});
                const errors = (data.errors || []).length;
                summary += `| Metric | Value |\n|--------|-------|\n`;
                summary += `| Scenarios | ${scenarios.length} |\n`;
                summary += `| Baseline ASR | ${(baseline * 100).toFixed(1)}% |\n`;
                summary += `| Matrix Errors | ${errors} |\n\n`;
                summary += 'Matrix summary artifact uploaded with the workflow run.\n';
              } else {
                const asr = (Number(data.attack_success_rate || 0) * 100).toFixed(1);
                const total = data.total_attacks || 0;
                const findings = (data.findings || []).length;
                const critical = (data.findings || []).filter(f => f.severity === 'critical').length;
                summary += `| Metric | Value |\n|--------|-------|\n`;
                summary += `| Total Attacks | ${total} |\n`;
                summary += `| Attack Success Rate | ${asr}% |\n`;
                summary += `| Findings | ${findings} |\n`;
                summary += `| Critical | ${critical} |\n\n`;
                if (critical > 0) {
                  summary += '⚠️ **Critical findings detected — review required.**\n';
                } else {
                  summary += '✅ No critical findings.\n';
                }
              }
            } catch (e) {
              summary += `⚠️ Could not parse scan results: ${e.message}\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail on critical findings
        if: always() && steps.check_critical.outputs.critical_count > 0
        run: |
          echo "::error::AEGIS scan found ${{ steps.check_critical.outputs.critical_count }} critical finding(s)"
          exit 1
