name: Security Scan

on:
  schedule:
    - cron: "0 3 * * 1"  # Monday 3am UTC
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan type"
        required: false
        default: "baseline"
        type: choice
        options:
          - baseline
          - matrix
      config:
        description: "Optional config file path"
        required: false
        type: string
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run AEGIS security scan (offline mode)
        id: scan
        env:
          AEGIS_PROVIDER_MODE: "offline"
        run: |
          SCAN_TYPE="${{ inputs.scan_type || 'baseline' }}"
          CONFIG_ARG=""
          if [ -n "${{ inputs.config }}" ]; then
            CONFIG_ARG="--config ${{ inputs.config }}"
          fi

          # Exit code 2 = vulnerabilities found (expected)
          .venv/bin/aegis scan \
            --scan-type "${SCAN_TYPE}" \
            --format json \
            ${CONFIG_ARG} \
            --output reports/ci_scan_results.json || true

      - name: Generate HTML report
        if: always() && hashFiles('reports/ci_scan_results.json') != ''
        run: |
          .venv/bin/aegis report \
            --input reports/ci_scan_results.json \
            --format html \
            --output reports/ci_scan_results.html || true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-scan-results
          path: reports/ci_scan_*
          retention-days: 90

      - name: Check for critical findings
        id: check_critical
        if: always() && hashFiles('reports/ci_scan_results.json') != ''
        run: |
          CRITICAL=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('reports/ci_scan_results.json'))
              findings = data.get('findings', [])
              critical = [f for f in findings if f.get('severity') == 'critical']
              print(len(critical))
          except Exception:
              print(0)
          ")
          echo "critical_count=${CRITICAL}" >> "$GITHUB_OUTPUT"
          if [ "${CRITICAL}" -gt 0 ]; then
            echo "::warning::Found ${CRITICAL} critical finding(s)"
          fi

      - name: Post PR comment
        if: github.event_name == 'pull_request' && hashFiles('reports/ci_scan_results.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '### AEGIS Security Scan Results\n\n';
            try {
              const data = JSON.parse(fs.readFileSync('reports/ci_scan_results.json', 'utf8'));
              const asr = (data.attack_success_rate * 100).toFixed(1);
              const total = data.total_attacks || 0;
              const findings = (data.findings || []).length;
              const critical = (data.findings || []).filter(f => f.severity === 'critical').length;
              summary += `| Metric | Value |\n|--------|-------|\n`;
              summary += `| Total Attacks | ${total} |\n`;
              summary += `| Attack Success Rate | ${asr}% |\n`;
              summary += `| Findings | ${findings} |\n`;
              summary += `| Critical | ${critical} |\n\n`;
              if (critical > 0) {
                summary += '⚠️ **Critical findings detected — review required.**\n';
              } else {
                summary += '✅ No critical findings.\n';
              }
            } catch (e) {
              summary += `⚠️ Could not parse scan results: ${e.message}\n`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      - name: Fail on critical findings
        if: always() && steps.check_critical.outputs.critical_count > 0
        run: |
          echo "::error::AEGIS scan found ${{ steps.check_critical.outputs.critical_count }} critical finding(s)"
          exit 1
