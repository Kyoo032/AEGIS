name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync --dev --extra dashboard

      - name: Lint
        run: .venv/bin/ruff check aegis/

      - name: Type check
        run: .venv/bin/pyright

      - name: Run test suite
        run: >
          .venv/bin/pytest
          -p no:deepeval
          --cov=aegis
          --cov-report=term-missing
          --cov-fail-under=80
          -q

      - name: Schema validation smoke
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path
          from scripts.validate_reports import validate_files

          tmp = Path('/tmp/aegis_schema_smoke')
          tmp.mkdir(parents=True, exist_ok=True)

          matrix = {
              "generated_at": "2026-02-24T08:17:15Z",
              "baseline": 0.0,
              "errors": [],
              "scenarios": {
                  "baseline": {
                      "total_attacks": 1,
                      "total_successful": 0,
                      "attack_success_rate": 0.0,
                      "delta_vs_baseline": 0.0,
                      "errors": [],
                      "probe_results": [
                          {
                              "probe_id": "LLM01-001",
                              "module": "llm01_prompt_inject",
                              "owasp_id": "LLM01",
                              "owasp_category": "Prompt Injection",
                              "passed": True,
                              "success": False,
                              "score": 0.0,
                              "score_method": "rule_based",
                              "response_snippet": "blocked"
                          }
                      ]
                  }
              }
          }

          report = {
              "report_id": "report-smoke",
              "generated_at": "2026-02-24T08:17:15Z",
              "testbed_config": {},
              "total_attacks": 1,
              "total_successful": 0,
              "attack_success_rate": 0.0,
              "results_by_owasp": {
                  "LLM01": {
                      "owasp_id": "LLM01",
                      "category_name": "Prompt Injection",
                      "total_attacks": 1,
                      "successful_attacks": 0,
                      "attack_success_rate": 0.0,
                      "findings": []
                  }
              },
              "defense_comparison": None,
              "findings": [
                  {
                      "title": "sample",
                      "owasp_id": "LLM01",
                      "owasp_category": "Prompt Injection",
                      "atlas_technique": None,
                      "mitre_atlas_id": None,
                      "severity": "low",
                      "description": "desc",
                      "evidence": ["sample"],
                      "recommendation": "rec",
                      "delta_vs_baseline": None,
                      "owasp_mapping": {
                          "owasp_id": "LLM01",
                          "owasp_name": "Prompt Injection",
                          "mitre_atlas_id": None
                      }
                  }
              ],
              "recommendations": ["rec"],
              "run_errors": [],
              "probe_results": [],
              "methodology": None,
              "defense_matrix": None
          }

          matrix_path = tmp / 'matrix.json'
          report_path = tmp / 'report.json'
          matrix_path.write_text(json.dumps(matrix), encoding='utf-8')
          report_path.write_text(json.dumps(report), encoding='utf-8')

          assert validate_files('matrix', [str(matrix_path)]) == 0
          assert validate_files('report', [str(report_path)]) == 0
          PY

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build aegis dashboard

      - name: Run scanner smoke test
        run: |
          set +e
          docker compose run --rm \
            -e AEGIS_PROVIDER_MODE=offline \
            -e AEGIS_CONFIG_PATH=/app/aegis/config.yaml \
            aegis attack \
            --module llm01_prompt_inject \
            --output /app/reports/ci-docker-smoke
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 2 ]; then
            exit "$status"
          fi

          test -f reports/ci-docker-smoke/attack-llm01_prompt_inject.json

      - name: Start dashboard smoke test
        run: docker compose --profile dashboard up -d dashboard

      - name: Wait for dashboard health
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8501/_stcore/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose logs --tail=200 dashboard
          exit 1

      - name: Upload Docker smoke artifact
        if: always() && hashFiles('reports/ci-docker-smoke/*') != ''
        uses: actions/upload-artifact@v4
        with:
          name: aegis-docker-smoke
          path: reports/ci-docker-smoke/*
          retention-days: 30

      - name: Shutdown Docker services
        if: always()
        run: docker compose --profile dashboard down --volumes --remove-orphans
